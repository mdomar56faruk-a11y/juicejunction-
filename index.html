
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Question</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:pink;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    position:relative;
    z-index:10;
}

h1{
    font-size:35px;
    font-weight:bold;
    color:red;
}

button{
    padding:15px 30px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#yesBtn{
    background:#00cc66;
    color:white;
}

#noBtn{
    background:#ff3333;
    color:white;
    position:absolute;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

#result{
    display:none;
}

#message{
    font-size:40px;
    font-weight:bold;
    color:purple;
}

.graffiti{
    position:absolute;
    font-size:30px;
    animation:spin 3s infinite linear;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="container" id="question">
    <h1>NADU..! DO YOU LOVE ME?</h1>

    <button id="yesBtn">YES ❤️</button>
    <button id="noBtn">NO 😆</button>
</div>

<div id="result">
    <div id="message">
        I KNEW YOU LOVE ME ❤️
    </div>

    <br>

    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
         width="250">
</div>

<script>

// Floating hearts
for(let i=0;i<40;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*6)+"s";
    document.body.appendChild(heart);
}

// NO button runs away
let noBtn=document.getElementById("noBtn");

function moveButton(){
    let x=Math.random()*(window.innerWidth-100);
    let y=Math.random()*(window.innerHeight-100);

    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveButton();
});

// YES clicked
document.getElementById("yesBtn").onclick=function(){

    document.getElementById("question").style.display="none";
    document.getElementById("result").style.display="block";

    // Graffiti everywhere
    for(let i=0;i<80;i++){
        let g=document.createElement("div");
        g.className="graffiti";
        g.style.left=Math.random()*100+"vw";
        g.style.top=Math.random()*100+"vh";
        document.body.appendChild(g);
    }

    // Open WhatsApp
    setTimeout(function(){
        window.location.href =
        "https://wa.me/8801603090929?text=" +
        encodeURIComponent("I Love You So Much WALID🥰");
    },1500);
}
</script>

</body>
</html>
